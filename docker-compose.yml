version: '3.8'

services:
  hte-app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - DATABASE_URL=sqlite:////data/hte_beta.db
      - DATA_FOLDER_PATH=/data
    volumes:
      # Persistent data: SQLite DB + Excel reference files + Private Inventory
      - hte-data:/data
    restart: unless-stopped

volumes:
  hte-data:
